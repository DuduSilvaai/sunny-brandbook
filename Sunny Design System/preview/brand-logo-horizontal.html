<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--sunny-command-black); font-family: var(--sunny-font-ui); }
  .row { display: flex; gap: 12px; }
  .logo-card { flex: 1; border-radius: 12px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; border: var(--sunny-border-subtle); min-height: 110px; }
  .logo-card img { max-height: 48px; max-width: 180px; object-fit: contain; }
  .logo-label { font-size: 11px; font-family: var(--sunny-font-mono); color: var(--sunny-muted); }
</style>
</head><body>
<div class="row">
  <div class="logo-card" style="background:var(--sunny-command-black);">
    <img src="../assets/logo-horizontal-colorido.svg" alt="Logo horizontal colorido">
    <div class="logo-label">horizontal · colorido · surface</div>
  </div>
  <div class="logo-card" style="background:#FAFAFA;">
    <img src="../assets/logo-horizontal-preto.svg" alt="Logo horizontal preto">
    <div class="logo-label" style="color:#71717A;">horizontal · preto · light bg</div>
  </div>
</div>
</body></html>
