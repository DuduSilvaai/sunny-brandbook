<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--sunny-command-black); font-family: var(--sunny-font-ui); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 100px; border-radius: 8px; overflow: hidden; }
  .swatch-color { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .swatch-info { padding: 7px 9px; background: var(--sunny-surface); border: var(--sunny-border-subtle); border-top: none; border-radius: 0 0 8px 8px; }
  .swatch-name { font-size: 11px; font-weight: 600; color: var(--sunny-foreground); }
  .swatch-hex  { font-size: 10px; font-family: var(--sunny-font-mono); color: var(--sunny-muted); }
  .swatch-label { font-size: 10px; color: var(--sunny-muted); margin-top: 2px; }
  .label { font-size: 11px; font-weight: 600; color: var(--sunny-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .secondary-row { display: flex; gap: 10px; margin-top: 10px; }
</style>
</head><body>
<div class="label">Semantic & Secondary Colors</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:rgba(34,197,94,0.15); color:#22C55E;">✓</div><div class="swatch-info"><div class="swatch-name">Harvest Green</div><div class="swatch-hex">#22C55E</div><div class="swatch-label">Colheita / success</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:rgba(239,68,68,0.15); color:#EF4444;">✕</div><div class="swatch-info"><div class="swatch-name">Eclipse Red</div><div class="swatch-hex">#EF4444</div><div class="swatch-label">Errors / dead leads</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:rgba(234,179,8,0.15); color:#EAB308;">⚠</div><div class="swatch-info"><div class="swatch-name">Flare Warning</div><div class="swatch-hex">#EAB308</div><div class="swatch-label">Cooling leads</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:rgba(56,189,248,0.15); color:#38BDF8;">ℹ</div><div class="swatch-info"><div class="swatch-name">Horizon Blue</div><div class="swatch-hex">#38BDF8</div><div class="swatch-label">Info / data</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:rgba(139,92,246,0.15); color:#8B5CF6;">★</div><div class="swatch-info"><div class="swatch-name">Eclipse Violet</div><div class="swatch-hex">#8B5CF6</div><div class="swatch-label">Premium / enterprise</div></div></div>
</div>
</body></html>
