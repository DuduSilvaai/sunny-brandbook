<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--sunny-command-black); font-family: var(--sunny-font-ui); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .token { background: var(--sunny-surface); border: var(--sunny-border-subtle); border-radius: 8px; padding: 12px 10px; }
  .bar-wrap { height: 8px; background: rgba(63,63,70,0.3); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
  .bar { height: 8px; background: var(--sunny-gradient-solar); border-radius: 4px; }
  .tok-name { font-family: var(--sunny-font-mono); font-size: 11px; color: var(--sunny-solar-flare); }
  .tok-val  { font-size: 12px; font-weight: 600; color: var(--sunny-foreground); margin-top: 2px; }
  .label { font-size: 11px; font-weight: 600; color: var(--sunny-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head><body>
<div class="label">Spacing Scale — Base 4px</div>
<div class="grid">
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:4px;"></div></div><div class="tok-name">--space-1</div><div class="tok-val">4px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:8px;"></div></div><div class="tok-name">--space-2</div><div class="tok-val">8px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:12px;"></div></div><div class="tok-name">--space-3</div><div class="tok-val">12px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:16px;"></div></div><div class="tok-name">--space-4</div><div class="tok-val">16px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:24px;"></div></div><div class="tok-name">--space-6</div><div class="tok-val">24px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:32px;"></div></div><div class="tok-name">--space-8</div><div class="tok-val">32px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:48px;"></div></div><div class="tok-name">--space-12</div><div class="tok-val">48px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:64px;"></div></div><div class="tok-name">--space-16</div><div class="tok-val">64px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:90%;"></div></div><div class="tok-name">--space-24</div><div class="tok-val">96px</div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:100%;"></div></div><div class="tok-name">--space-32</div><div class="tok-val">128px</div></div>
</div>
</body></html>
